  skin-locked-find: "&cбҙ…бҙҮКҷбҙҮs бҙҮЙҙбҙ„бҙҸЙҙбҙӣКҖбҙҖКҖ бҙҮsбҙӣбҙҮ бҙҖsбҙҳбҙҮбҙ„бҙӣбҙҸ бҙҮsбҙ„бҙҸЙҙбҙ…ЙӘбҙ…бҙҸ бҙҮЙҙ бҙҮКҹ бҙҚбҙҖбҙҳбҙҖ бҙҳбҙҖКҖбҙҖ бҙ…бҙҮsКҷКҹбҙҸQбҙңбҙҮбҙҖКҖКҹбҙҸ."
  skin-equipped: "&aВЎКңбҙҖs бҙҮПҷбҙңЙӘбҙҳбҙҖбҙ…бҙҸ бҙҮКҹ бҙҖsбҙҳбҙҮбҙ„бҙӣбҙҸ %skin_name%&a!"
  loc-added: "&aбҙңКҷЙӘбҙ„бҙҖбҙ„ЙӘбҙҸЙҙ КҖбҙҮЙўЙӘsбҙӣКҖбҙҖбҙ…бҙҖ бҙ„бҙҸбҙҚбҙҸ бҙҳбҙңЙҙбҙӣбҙҸ бҙ…бҙҮ бҙ…бҙҮsКҷКҹбҙҸQбҙңбҙҮбҙҖКҖ бҙҳбҙҖКҖбҙҖ %skin_name%&a."
  loc-removed: "&cбҙңКҷЙӘбҙ„бҙҖбҙ„ЙӘбҙҸЙҙ бҙҮКҹЙӘбҙҚЙӘЙҙбҙҖбҙ…бҙҖ бҙ„бҙҸбҙҚбҙҸ бҙҳбҙңЙҙбҙӣбҙҸ бҙ…бҙҮ бҙ…бҙҮsКҷКҹбҙҸQбҙңбҙҮбҙҸ."
