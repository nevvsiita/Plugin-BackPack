# Ajustes de la animaciГіn de carga al abrir la mochila
backpack-opening:
  enabled: true
  delay: 1.5
  update-interval: 3
  cancel-on-move: false
  cancel-on-damage: false
  cancel-on-item-swap: false
  messages:
    already-opening: "&7&lКҷбҙҖбҙ„бҙӢбҙҳбҙҖбҙ„бҙӢ &8В» &cВЎTu backpack ya se estГЎ abriendo!"
    cancelled: "&7&lКҷбҙҖбҙ„бҙӢбҙҳбҙҖбҙ„бҙӢ &8В» &cLa apertura ha sido interrumpida."
    progress: "&7&lКҷбҙҖбҙ„бҙӢбҙҳбҙҖбҙ„бҙӢ &8В» &r%bar% &7%percent%%"
  bar:
    length: 10
    char-filled: "в—Ҹ"
    char-empty: "в—Ӣ"
  sound:
    enabled: true
    name: "BLOCK_NOTE_BLOCK_PLING"
    pitch-start: 0.5
    pitch-end: 1.5

# Ajustes de cooldowns del plugin (en segundos)
cooldowns:
  # Tiempo de espera para cambiar de color/aspecto de mochila
  change-skin: 10

# Ajustes de renderizado de la mochila en la espalda del jugador
backpack-display:
  # Habilitar o deshabilitar mostrar la mochila en la espalda
  enabled: false
  # Modo de transformaciГіn de Minecraft (HEAD, FIXED, NONE, GROUND, etc.)
  # HEAD: Sigue la orientaciГіn de la cabeza (puede rotar y girar al mirar arriba/abajo).
  # FIXED: Fijo respecto al cuerpo del jugador (ВЎRECOMENDADO para evitar que gire raro al caminar!).
  transform: "FIXED"
  # CompensaciГіn de retraso de renderizado (lag-compensation).
  # Ajusta quГ© tan adelante se proyecta la mochila al correr para sincronizarla con el cliente.
  # 1.5 es el valor recomendado. 0.0 para desactivar.
  lag-compensation: 1.5
  # Ajustes de posiciГіn de la mochila (desplazamientos relativos al jugador)
  position:
    # Desplazamiento lateral (0 = centrado)
    x: 0.0
    # Altura relativa al torso (0.0 = a la altura media de la espalda)
    y: 0.0
    # Distancia hacia atrГЎs (-0.22 = pegada a la espalda)
    z: -0.22
  # Ajustes de rotaciГіn (en grados)
  rotation:
    # RotaciГіn en el eje Y (180.0 = para que la cara frontal de la mochila mire hacia atrГЎs)
    y: 180.0
    # RotaciГіn en el eje X
    x: 0.0
    # RotaciГіn en el eje Z
    z: 0.0
  # Ajustes de escala (tamaГұo de la mochila en la espalda)
  scale:
    x: 0.65
    y: 0.65
    z: 0.65
  # Ajuste del tag de nombre sustituto
  nametag:
    # Altura del tag sobre la cabeza del jugador (en bloques)
    y-offset: 0.25

