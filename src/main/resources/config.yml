  slot-unlocked: "&aВЎКңбҙҖs бҙ…бҙҮsКҷКҹбҙҸQбҙңбҙҮбҙҖбҙ…бҙҸ бҙңЙҙбҙҖ ЙҙбҙңбҙҮбҙ бҙҖ КҖбҙҖЙҙбҙңКҖбҙҖ бҙҳбҙҸКҖ &e$%cost%&a!"
  slot-locked-previous: "&cВЎбҙ…бҙҮКҷбҙҮs бҙ…бҙҮsКҷКҹбҙҸQбҙңбҙҮбҙҖКҖ КҹбҙҖs КҖбҙҖЙҙбҙңКҖбҙҖs бҙҖЙҙбҙӣбҙҮКҖЙӘбҙҸКҖбҙҮs бҙҳКҖЙӘбҙҚбҙҮКҖбҙҸ!"
  data-saved: "&aКҹбҙҸs бҙ…бҙҖбҙӣбҙҸs бҙ…бҙҮ бҙӣбҙң бҙҚбҙҸбҙ„КңЙӘКҹбҙҖ КңбҙҖЙҙ sЙӘбҙ…бҙҸ ЙўбҙңбҙҖКҖбҙ…бҙҖбҙ…бҙҸs."
  admin-usage: "&eбҙңsбҙҸ: &b/mochila admin [setslots/getslots/addloc/removeloc/reload] ... &oГі &b/mochila give [jugador]"
  player-not-found: "&cбҙҠбҙңЙўбҙҖбҙ…бҙҸКҖ ЙҙбҙҸ бҙҮЙҙбҙ„бҙҸЙҙбҙӣКҖбҙҖбҙ…бҙҸ."
