      - "&8&m---------------------------------"
  next-unlocked:
    material: "ARROW"
    name: "&a&lᴘᴀɢɪɴᴀ sɪɢᴜɪᴇɴᴛᴇ &7(ᴘᴀɢɪɴᴀ %next_page%)"
