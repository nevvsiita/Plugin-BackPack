      material: "PLAYER_HEAD"
      hdb-id: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvYmViNTg4YjBiNDA5NzhjNzUxMDQ3YTQyODUsN2NhN2VkY2QyM2VjOTI5ODg3MzdmYTY1OGY5ZDU0YjcyYTFhIn19fQ=="
