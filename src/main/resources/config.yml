# =========================================================================
# CONFIGURACIÓN GENERAL DEL PLUGIN DE MOCHILA (BACKPACK)
# =========================================================================

# Ajustes de la interfaz de la mochila
gui:
  # Título del inventario (Mochila con degradado gris en negrita)
  title: "<gradient:#95a5a6:#7f8c8d>&lᴍᴏᴄʜɪʟᴀ</gradient>"
  # Tamaño del inventario. FIJADO EN 36 para diseño de 4 filas.
  # (25 ranuras de almacenamiento en diseño centrado, botones de control simétricos)
  size: 36

# Ajustes de la interfaz del selector de aspectos (skins)
skin-selector-gui:
  # Título del inventario del selector (Gris oscuro y en tipografía Small Caps)
  title: "&8&lsᴇʟᴇᴄᴛᴏʀ ᴅᴇ ᴀsᴘᴇᴄᴛᴏ"
  # Botón de retroceso "Volver" (slot 17)
  back-button:
    material: "BARRIER"
    name: "&c&lᴠᴏʟᴠᴇʀ"
    lore:
      - "&8&m---------------------------------"
      - " &7ʜᴀᴢ ᴄʟɪᴄ ᴘᴀʀᴀ ʀᴇɢʀᴇsᴀʀ ᴀ ʟᴀ"
      - " &7ᴍᴏᴄʜɪʟᴀ ᴘʀɪɴᴄɪᴘᴀʟ."
      - "&8&m---------------------------------"
  # Estados del aspecto según el progreso del jugador
  status:
    equipped:
      lore:
        - " &a(ᴇQᴜɪᴘᴀᴅᴏ)"
    unlocked:
      lore:
        - "&8&m---------------------------------"
        - " &eᴅᴇsʙʟᴏQᴜᴇᴀᴅᴏ"
        - ""
        - " &a&l→ ᴄʟɪᴄᴋ ᴘᴀʀᴀ ᴇQᴜɪᴘᴀʀ"
        - "&8&m---------------------------------"
    locked:
      lore:
        - "&8&m---------------------------------"
        - " &cʙʟᴏQᴜᴇᴀᴅᴏ"
        - "&8&m---------------------------------"

# Ajustes del ítem físico de la mochila
backpack-item:
  # Nombre del ítem (Nombre de la Skin + (ᴄʟɪᴄᴋ ᴅᴇʀᴇᴄʜᴏ ᴘᴀʀᴀ ᴀʙʀɪʀ) en gris y Small Caps)
  name: "%skin_name% &7(ᴄʟɪᴄᴋ ᴅᴇʀᴇᴄʜᴏ ᴘᴀʀᴀ ᴀʙʀɪʀ)"
  # Lore del ítem
  lore:
    - "&8&m---------------------------------"
    - " &7¡ᴜɴᴀ ᴍᴏᴄʜɪʟᴀ ᴘᴏʀᴛᴀᴛɪʟ ᴘᴀʀᴀ ᴛᴜs ᴠɪᴀᴊᴇs!"
    - ""
    - " &e&l→ ʜᴀᴢ ᴄʟɪᴄ ᴘᴀʀᴀ ʜᴀᴄᴇʀ ᴄʟɪᴄ ᴅᴇʀᴇᴄʜᴏ ʏ ᴀʙʀɪʀʟᴀ"
    - "&8&m---------------------------------"

# Ítem del botón para abrir el selector de colores (slot 31 - centro de la fila 4)
