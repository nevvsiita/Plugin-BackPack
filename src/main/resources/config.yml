        - "&8&m---------------------------------"
        - " &cКҷКҹбҙҸQбҙңбҙҮбҙҖбҙ…бҙҸ"
        - ""
        - " &7бҙ…бҙҮКҷбҙҮs бҙҮЙҙбҙ„бҙҸЙҙбҙӣКҖбҙҖКҖ бҙҮsбҙӣбҙҮ"
