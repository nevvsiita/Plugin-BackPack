  admin-get-success: "&aбҙҮКҹ бҙҠбҙңЙўбҙҖбҙ…бҙҸКҖ &e%player% &aбҙӣЙӘбҙҮЙҙбҙҮ &b%slots% &aКҖбҙҖЙҙбҙңКҖбҙҖs бҙ…бҙҮsКҷКҹбҙҸQбҙңбҙҮбҙҖбҙ…as."
