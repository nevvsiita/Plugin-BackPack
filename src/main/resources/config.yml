      - "&8&m---------------------------------"

# Mensajes del plugin (soporta códigos de color)
messages:
  prefix: "&7[&bᴍᴏᴄʜɪʟᴀ&7] &r"
  no-permission: "&cɴᴏ ᴛɪᴇɴᴇs ᴘᴇʀᴍɪsᴏs ᴘᴀʀᴀ ᴜsᴀʀ ᴇsᴛᴇ ᴄᴏᴍᴀɴᴅᴏ."
  only-players: "&cᴇsᴛᴇ ᴄᴏᴍᴀɴᴅᴏ sᴏʟᴏ ᴘᴜᴇᴅᴇ sᴇʀ ᴇᴊᴇᴄᴜᴛᴀᴅᴏ ᴘᴏʀ ᴊᴜɢᴀᴅᴏʀᴇs."
  no-funds: "&cɴᴏ ᴛɪᴇɴᴇs sᴜғɪᴄɪᴇɴᴛᴇ ᴅɪɴᴇʀᴏ. ɴᴇᴄᴇsɪᴛᴀs &e$%cost%&c."
  slot-unlocked: "&a¡ʜᴀs ᴅᴇsʙʟᴏQᴜᴇᴀᴅᴏ ᴜɴᴀ ɴᴜᴇᴠᴀ ʀᴀɴᴜʀᴀ ᴘᴏʀ &e$%cost%&a!"
  slot-locked-previous: "&c¡ᴅᴇʙᴇs ᴅᴇsʙʟᴏQᴜᴇᴀʀ ʟᴀs ʀᴀɴᴜʀᴀs ᴀɴᴛᴇʀɪᴏʀᴇs ᴘʀɪᴍᴇʀᴏ!"
  data-saved: "&aʟᴏs ᴅᴀᴛᴏs ᴅᴇ ᴛᴜ ᴍᴏᴄʜɪʟᴀ ʜᴀɴ sɪᴅᴏ ɢᴜᴀʀᴅᴀᴅᴏs."
  admin-usage: "&eᴜsᴏ: &b/mochila admin [setslots/getslots/addloc/removeloc/reload] ... &oó &b/mochila give [jugador]"
  player-not-found: "&cᴊᴜɢᴀᴅᴏʀ ɴᴏ ᴇɴᴄᴏɴᴛʀᴀᴅᴏ."
  admin-set-success: "&aʜᴀs ᴇsᴛᴀʙʟᴇᴄɪᴅᴏ ʟᴀs ʀᴀɴᴜʀᴀs ᴅᴇ &e%player% &aᴀ &b%slots%&a."
  admin-get-success: "&aᴇʟ ᴊᴜɢᴀᴅᴏʀ &e%player% &aᴛɪᴇɴᴇ &b%slots% &aʀᴀɴᴜʀᴀs ᴅᴇsʙʟᴏQᴜᴇᴀᴅas."
  item-given: "&a¡sᴇ ʜᴀ ᴇɴᴛʀᴇɢᴀᴅᴏ ʟᴀ ᴍᴏᴄʜɪʟᴀ ᴀ &e%player%&a!"
  skin-found: "&a¡ғᴇʟɪᴄɪᴅᴀᴅᴇs! ʜᴀs ᴇɴᴄᴏɴᴛʀᴀᴅᴏ ʟᴀ %skin_name%&a. ¡ᴀʜᴏʀᴀ ʟᴀ ᴛɪᴇɴᴇs ᴅᴇsʙʟᴏQᴜᴇᴀᴅᴀ!"
  skin-already-found: "&cʏᴀ ʜᴀʙɪᴀs ᴅᴇsʙʟᴏQᴜᴇᴀᴅᴏ ᴇsᴛᴇ ᴀsᴘᴇᴄᴛᴏ ᴀɴᴛᴇʀɪᴏʀᴍᴇɴᴛe."
  skin-locked-find: "&cᴅᴇʙᴇs ᴇɴᴄᴏɴᴛʀᴀʀ ᴇsᴛᴇ ᴀsᴘᴇᴄᴛᴏ ᴇsᴄᴏɴᴅɪᴅᴏ ᴇɴ ᴇʟ ᴍᴀᴘᴀ ᴘᴀʀᴀ ᴅᴇsʙʟᴏQᴜᴇᴀʀʟᴏ."
  skin-equipped: "&a¡ʜᴀs ᴇϙᴜɪᴘᴀᴅᴏ ᴇʟ ᴀsᴘᴇᴄᴛᴏ %skin_name%&a!"
  loc-added: "&aᴜʙɪᴄᴀᴄɪᴏɴ ʀᴇɢɪsᴛʀᴀᴅᴀ ᴄᴏᴍᴏ ᴘᴜɴᴛᴏ ᴅᴇ ᴅᴇsʙʟᴏQᴜᴇᴀʀ ᴘᴀʀᴀ %skin_name%&a."
  loc-removed: "&cᴜʙɪᴄᴀᴄɪᴏɴ ᴇʟɪᴍɪɴᴀᴅᴀ ᴄᴏᴍᴏ ᴘᴜɴᴛᴏ ᴅᴇ ᴅᴇsʙʟᴏQᴜᴇᴏ."
  no-block-looking: "&cᴅᴇʙᴇs ᴇsᴛᴀʀ ᴍɪʀᴀɴᴅᴏ ᴜɴ ʙʟᴏϙᴜᴇ ᴘᴀʀᴀ ʜᴀᴄᴇʀ ᴇsᴛᴏ."
  no-loc-here: "&cɴᴏ ʜᴀʏ ɴɪɴɢᴜɴᴀ ᴍᴏᴄʜɪʟᴀ ʀᴇɢɪsᴛʀᴀᴅᴀ ᴇɴ ᴇsᴛᴇ ʙʟᴏϙᴜᴇ."

