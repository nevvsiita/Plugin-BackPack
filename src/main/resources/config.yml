# =========================================================================
# CONFIGURACIÓN GENERAL DEL PLUGIN DE MOCHILA (BACKPACK)
# =========================================================================

# Ajustes de la interfaz de la mochila
gui:
  # Título del inventario (Mochila con degradado gris en negrita)
  title: "&8&lʙᴀᴄᴋᴘᴀᴄᴋ &r&7%player%"
  # Tamaño del inventario. FIJADO EN 36 para diseño de 4 filas.
  # (25 ranuras de almacenamiento en diseño centrado, botones de control simétricos)
  size: 36

# Ajustes de cooldowns del plugin (en segundos)
cooldowns:
  # Tiempo de espera para cambiar de color/aspecto de mochila
  change-skin: 10

# Ajustes de renderizado de la mochila en la espalda del jugador
backpack-display:
  # Habilitar o deshabilitar mostrar la mochila en la espalda
  enabled: true
  # Modo de transformación de Minecraft (HEAD, FIXED, NONE, GROUND, etc.)
  # HEAD: Sigue la orientación de la cabeza (puede rotar y girar al mirar arriba/abajo).
  # FIXED: Fijo respecto al cuerpo del jugador (¡RECOMENDADO para evitar que gire raro al caminar!).
  transform: "FIXED"
  # Ajustes de posición de la mochila (desplazamientos relativos al jugador)
  position:
    # Desplazamiento lateral (0 = centrado)
    x: 0.0
    # Altura relativa al torso (0.0 = a la altura media de la espalda)
    y: 0.0
    # Distancia hacia atrás (-0.22 = pegada a la espalda)
    z: -0.22
  # Ajustes de rotación (en grados)
  rotation:
    # Rotación en el eje Y (180.0 = para que la cara frontal de la mochila mire hacia atrás)
    y: 180.0
    # Rotación en el eje X
    x: 0.0
    # Rotación en el eje Z
    z: 0.0
  # Ajustes de escala (tamaño de la mochila en la espalda)
  scale:
    x: 0.65
    y: 0.65
    z: 0.65
  # Ajuste del tag de nombre sustituto
  nametag:
    # Altura del tag sobre la cabeza del jugador (en bloques)
    y-offset: 0.25

# Ajustes de la interfaz del selector de aspectos (skins)
skin-selector-gui:
  # Título del inventario del selector (Gris oscuro y en tipografía Small Caps)
  title: "&8&lsᴇʟᴇᴄᴛᴏʀ ᴅᴇ ᴀsᴘᴇᴄᴛᴏ"
  # Botón de retroceso "Volver" (slot 17)
  back-button:
    material: "BARRIER"
    name: "&c&lᴠᴏʟᴠᴇʀ"
    lore:
      - "&8&m---------------------------------"
      - " &7ʜᴀᴢ ᴄʟɪᴄ ᴘᴀʀᴀ ʀᴇɢʀᴇsᴀʀ ᴀ ʟᴀ"
      - " &7ᴍᴏᴄʜɪʟᴀ ᴘʀɪɴᴄɪᴘᴀʟ."
      - "&8&m---------------------------------"
  # Estados del aspecto según el progreso del jugador
  status:
    equipped:
      lore:
        - "&8&m---------------------------------"
        - " <#B8FFBA>&l(&lᴇ&lǫ&lᴜ&lɪ&lᴘ&lᴀ&lᴅ&lᴏ&l)"
        - "&8&m---------------------------------"
    unlocked:
      lore:
        - "&8&m---------------------------------"
        - " &eᴅᴇѕʙʟᴏǫᴜᴇᴀᴅᴏ"
        - ""
        - " <#B8FFBA>&l→ &lᴄ&lʟ&lɪ&lᴄ&lᴋ &lᴘ&lᴀ&lʀ&lᴀ &lᴇ&lǫ&lᴜ&lɪ&lᴘ&lᴀ&lʀ"
        - "&8&m---------------------------------"
    locked:
      lore:
        - "&8&m---------------------------------"
        - " &cʙʟᴏǫᴜᴇᴀᴅᴏ"
        - "&8&m---------------------------------"

