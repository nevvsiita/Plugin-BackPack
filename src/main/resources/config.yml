      - " &7ʜᴀᴢ ᴄʟɪᴄ ᴘᴀʀᴀ ɪʀ ᴀ ʟᴀ sɪɢᴜɪᴇɴᴛᴇ."
      - ""
      - " &a&l→ ᴄʟɪᴄᴋ ᴘᴀʀᴀ ᴀᴠᴀɴᴢᴀʀ"
      - "&8&m---------------------------------"
