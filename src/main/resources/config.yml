    material: "GRAY_STAINED_GLASS_PANE"
    name: "&c&lᴘᴀɢɪɴᴀ sɪɢᴜɪᴇɴᴛᴇ &7(ʙʟᴏQᴜᴇᴀᴅᴀ)"
    lore:
      - "&8&m---------------------------------"
      - " &7ᴅᴇʙᴇs ᴅᴇsʙʟᴏQᴜᴇᴀʀ ʟᴀs 25 ʀᴀɴᴜʀᴀs"
