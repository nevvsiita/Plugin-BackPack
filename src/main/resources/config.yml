      - " &7¡ᴅᴇʙᴇs ᴅᴇsʙʟᴏQᴜᴇᴀʀ ʟᴀs ʀᴀɴᴜʀᴀs"
      - " &7ᴀɴᴛᴇʀɪᴏʀᴇs ᴀɴᴛᴇs ᴅᴇ ᴄᴏᴍᴘʀᴀʀ ᴇsᴛᴀ!"
      - "&8&m---------------------------------"

# Costo para desbloquear cada slot.
# El máximo de ranuras de almacenamiento por página es 25 (en diseño centrado).
# Así que definimos la escala de costos del 2 al 25.
unlock-costs:
  2: 100
  3: 200
  4: 400
  5: 800
  6: 1500
  7: 3000
  8: 5000
  9: 8000
  10: 12000
  11: 16000
  12: 20000
  13: 25000
  14: 30000
  15: 35000
  16: 40000
  17: 45000
  18: 50000
  19: 60000
  20: 70000
  21: 80000
  22: 90000
  23: 100000
  24: 120000
  25: 140000
  # Costo por defecto para slots >= 26 si hubiese más
  default-multiplier: 10000

